<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Облачный проект</title>
  <style>
    body { font-family: "Inter", sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; margin-bottom: 20px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    button.mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background: #dfa400; }
    .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
    .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
    .like-btn:hover { background: #e2e6ea; }
    .time { font-size: 11px; color: #999; float: right; }
    h3 { margin-top: 0; }
  </style>
</head>

<body>
  <div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackform">
      <input type="text" id="UserName" placeholder="Введите имя" required>
      <input type="email" id="UserEmail" placeholder="Введите Mail" required>
      <button type="submit">Отправить в облако</button>
    </form>
  </div>

  <div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn" class="mainBtn">Опубликовать в облако</button>
  </div>

  <div id="feed" style="width: 100%; max-width: 500px;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

    // Firebase конфигурация
    const firebaseConfig = {
      apiKey: "AIzaSyCTTcspjJ05PpZOFGVAZHrTq5BX_tTPQjc",
      authDomain: "dan123-1fcc9.firebaseapp.com",
      projectId: "dan123-1fcc9",
      storageBucket: "dan123-1fcc9.firebasestorage.app",
      messagingSenderId: "430988558583",
      appId: "1:430988558583:web:58420b11df7034a5df13f2",
      measurementId: "G-M309376PCW"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // Метод для лайков
    window.processLike = async (id) => {
      const docRef = doc(db, "requests", id);
      try {
        await updateDoc(docRef, { likes: increment(1) });
      } catch (e) { 
        console.error("Validation Error:", e.message); 
      }
    };

    // Обработка формы отправки заявки
    document.getElementById("feedbackform").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nameInput = document.getElementById("UserName").value;
      const emailInput = document.getElementById("UserEmail").value;

      try {
        await addDoc(collection(db, "requests"), {
          name: nameInput,
          email: emailInput,
          likes: 0,
          timestamp: serverTimestamp()
        });
        alert("Готово! Данные сохранены в Firebase.");
        document.getElementById("feedbackform").reset();
      } catch (error) {
        console.error("Ошибка записи: ", error);
        alert("Ошибка при отправке.");
      }
    });

    // Метод для публикации из панели управления
    document.getElementById("mainBtn").onclick = async () => {
      const btn = document.getElementById("mainBtn");
      btn.disabled = true;
      try {
        await addDoc(collection(db, "requests"), {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          likes: 0,
          timestamp: serverTimestamp()
        });
        alert("Готово! Данные сохранены в Firebase.");
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
      } catch (e) { 
        alert("Ошибка безопасности: Данные отклонены сервером."); 
        console.error(e);
      }
      btn.disabled = false;
    };

    // Метод: REAL-TIME СИНХРОНИЗАЦИЯ
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      const feed = document.getElementById('feed');
      feed.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const timeString = data.timestamp && data.timestamp.toDate ? data.timestamp.toDate().toLocaleTimeString() : '...';
        feed.innerHTML += `
          <div class="post">
            <span class="time">${timeString}</span>
            <b>${data.name || 'Без имени'}</b>
            <p style="margin: 5px 0;">${data.email || 'Нет email'}</p>
            <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
