<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение | BaaS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Карточки */
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Формы */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Лента */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .live {
            background: #10b981;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .post {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .post:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .name {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .time {
            font-size: 11px;
            color: #999;
        }

        .email {
            color: #667eea;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .like-btn {
            background: white;
            border: 2px solid #ddd;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .like-btn:hover {
            background: #ff4757;
            border-color: #ff4757;
            color: white;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .alert {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
        }

        .success {
            background: #d1fae5;
            border-left-color: #10b981;
        }

        .error {
            background: #fee2e2;
            border-left-color: #ef4444;
        }

        .stats {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Форма 1: Быстрая отправка -->
        <div class="card">
            <h2>📝 Отправить заявку</h2>
            <form id="quickForm">
                <div class="form-group">
                    <label>👤 Имя:</label>
                    <input type="text" id="quickName" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label>📧 Email:</label>
                    <input type="email" id="quickEmail" placeholder="example@mail.com" required>
                </div>
                <button type="submit">Отправить</button>
            </form>
        </div>

        <!-- Форма 2: Панель управления -->
        <div class="card">
            <h2>⚙️ Панель управления</h2>
            <div class="form-group">
                <label>👤 Имя:</label>
                <input type="text" id="adminName" placeholder="Введите имя">
            </div>
            <div class="form-group">
                <label>📧 Email:</label>
                <input type="email" id="adminEmail" placeholder="work@company.com">
            </div>
            <button id="publishBtn">Опубликовать</button>
            <div id="message" class="alert" style="display: none;"></div>
        </div>

        <!-- Живая лента -->
        <div class="card">
            <div class="feed-header">
                <h2>📡 Живая лента</h2>
                <span class="live">● LIVE</span>
            </div>
            <div class="stats" id="stats">Загрузка...</div>
            <div id="feed">
                <div class="empty">⏳ Ожидание данных...</div>
            </div>
        </div>
    </div>

    <script type="module">
        // Подключаем Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            orderBy, 
            onSnapshot, 
            serverTimestamp, 
            updateDoc, 
            doc, 
            increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Конфигурация Firebase (ваш проект)
        const firebaseConfig = {
            apiKey: "AIzaSyCTTcspjJ05PpZOFGVAZHrTq5BX_tTPQjc",
            authDomain: "dan123-1fcc9.firebaseapp.com",
            projectId: "dan123-1fcc9",
            storageBucket: "dan123-1fcc9.firebasestorage.app",
            messagingSenderId: "430988558583",
            appId: "1:430988558583:web:58420b11df7034a5df13f2"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция показа сообщений
        function showMessage(text, type = "info") {
            const msgDiv = document.getElementById("message");
            msgDiv.textContent = text;
            msgDiv.className = `alert ${type}`;
            msgDiv.style.display = "block";
            setTimeout(() => {
                msgDiv.style.display = "none";
            }, 3000);
        }

        // Функция добавления записи
        async function addPost(name, email) {
            if (!name || !email) {
                showMessage("Заполните все поля!", "error");
                return false;
            }

            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                showMessage("✅ Данные сохранены!", "success");
                return true;
            } catch (error) {
                showMessage("❌ Ошибка: " + error.message, "error");
                console.error(error);
                return false;
            }
        }

        // Обработка быстрой формы
        document.getElementById("quickForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("quickName").value;
            const email = document.getElementById("quickEmail").value;
            
            const success = await addPost(name, email);
            if (success) {
                document.getElementById("quickForm").reset();
            }
        });

        // Обработка панели управления
        document.getElementById("publishBtn").onclick = async () => {
            const btn = document.getElementById("publishBtn");
            btn.disabled = true;
            btn.textContent = "Отправка...";
            
            const name = document.getElementById("adminName").value;
            const email = document.getElementById("adminEmail").value;
            
            const success = await addPost(name, email);
            if (success) {
                document.getElementById("adminName").value = "";
                document.getElementById("adminEmail").value = "";
            }
            
            btn.disabled = false;
            btn.textContent = "Опубликовать";
        };

        // Функция для лайков
        window.likePost = async (postId) => {
            try {
                const postRef = doc(db, "requests", postId);
                await updateDoc(postRef, {
                    likes: increment(1)
                });
                console.log("Лайк поставлен!");
            } catch (error) {
                console.error("Ошибка:", error);
                showMessage("Не удалось поставить лайк", "error");
            }
        };

        // Живая лента (Real-time)
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            const stats = document.getElementById("stats");
            
            // Обновляем статистику
            stats.innerHTML = `📊 Всего записей: ${snapshot.size} | Обновлено: ${new Date().toLocaleTimeString()}`;
            
            // Если нет записей
            if (snapshot.empty) {
                feed.innerHTML = '<div class="empty">📭 Нет записей. Создайте первую!</div>';
                return;
            }
            
            // Отображаем все записи
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const postId = doc.id;
                
                // Форматируем время
                let timeText = "только что";
                if (data.timestamp && data.timestamp.toDate) {
                    const date = data.timestamp.toDate();
                    timeText = date.toLocaleTimeString();
                }
                
                // Создаём пост
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <span class="name">👤 ${data.name || "Аноним"}</span>
                            <span class="time">🕐 ${timeText}</span>
                        </div>
                        <div class="email">📧 ${data.email || "Нет email"}</div>
                        <button class="like-btn" onclick="likePost('${postId}')">
                            ❤️ ${data.likes || 0} лайков
                        </button>
                    </div>
                `;
            });
        });

        console.log("✅ Приложение запущено!");
        console.log("🔒 Правила безопасности активны");
        console.log("💡 Попробуйте открыть сайт в двух браузерах и нажать лайк");
    </script>
</body>
</html>
